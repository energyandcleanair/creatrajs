name: tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install test dependencies
        shell: Rscript {0}
        run: install.packages(c("testthat", "dplyr"))

      # Runs the resource-free unit tests by sourcing the helpers directly. The
      # full package needs private deps (rcrea), system libs, HYSPLIT and MongoDB,
      # so its integration tests are not run here.
      - name: Run unit tests
        shell: Rscript {0}
        run: |
          suppressMessages({library(testthat); library(dplyr)})
          source("R/trajs.R")
          for (f in c("tests/testthat/test-trajs-drop-failed-rows.R")) {
            tmp <- tempfile(fileext = ".R")
            writeLines(gsub("creatrajs:::", "", readLines(f)), tmp)
            testthat::test_file(tmp, stop_on_failure = TRUE)
          }
          cat("All unit tests passed.\n")
